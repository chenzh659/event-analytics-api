<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-labelledby="t d">
  <title id="t">Reliable event pipeline</title>
  <desc id="d">Idempotent ingest with Redis Streams reclaim and dead-letter queue</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="340" rx="16" fill="#0f172a"/>
  <text x="40" y="42" fill="#f8fafc" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Reliable ingest pipeline</text>
  <text x="40" y="68" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">at-least-once delivery · multi-layer idempotency · poison-message isolation</text>

  <!-- steps -->
  <rect x="40" y="110" width="180" height="100" rx="12" fill="#0ea5e9"/>
  <text x="130" y="150" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">1. Claim</text>
  <text x="130" y="175" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">SET NX idem:{id}</text>
  <text x="130" y="195" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">replay → dedup</text>

  <rect x="260" y="110" width="180" height="100" rx="12" fill="#22c55e"/>
  <text x="350" y="150" text-anchor="middle" fill="#052e16" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">2. Enqueue</text>
  <text x="350" y="175" text-anchor="middle" fill="#052e16" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">XADD stream:events</text>
  <text x="350" y="195" text-anchor="middle" fill="#052e16" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">MAXLEN ~ · 202</text>

  <rect x="480" y="110" width="200" height="100" rx="12" fill="#a855f7"/>
  <text x="580" y="150" text-anchor="middle" fill="#1e1b4b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">3. Consume</text>
  <text x="580" y="175" text-anchor="middle" fill="#1e1b4b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">XREADGROUP</text>
  <text x="580" y="195" text-anchor="middle" fill="#1e1b4b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">XAUTOCLAIM PEL</text>

  <rect x="720" y="110" width="160" height="100" rx="12" fill="#f59e0b"/>
  <text x="800" y="150" text-anchor="middle" fill="#422006" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">4. Persist</text>
  <text x="800" y="175" text-anchor="middle" fill="#422006" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">INSERT ON</text>
  <text x="800" y="195" text-anchor="middle" fill="#422006" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">CONFLICT DO NOTHING</text>

  <rect x="920" y="110" width="140" height="100" rx="12" fill="#f43f5e"/>
  <text x="990" y="150" text-anchor="middle" fill="#4c0519" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">5. DLQ</text>
  <text x="990" y="175" text-anchor="middle" fill="#4c0519" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">max deliveries</text>
  <text x="990" y="195" text-anchor="middle" fill="#4c0519" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">stream:events:dlq</text>

  <line x1="220" y1="160" x2="255" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="440" y1="160" x2="475" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="680" y1="160" x2="715" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="880" y1="160" x2="915" y2="160" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="40" y="250" width="1020" height="55" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="550" y="283" text-anchor="middle" fill="#cbd5e1" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
    Fail without ACK → stays in PEL → reclaim after idle → poison → dead-letter (no infinite retry storm)
  </text>
</svg>
