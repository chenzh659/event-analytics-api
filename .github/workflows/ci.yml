name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: events
          POSTGRES_PASSWORD: events
          POSTGRES_DB: events
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U events -d events"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      DATABASE_URL: postgresql+asyncpg://events:events@localhost:5432/events
      DATABASE_URL_SYNC: postgresql://events:events@localhost:5432/events
      REDIS_URL: redis://localhost:6379/0
      INGEST_MODE: sync
      APP_ENV: test
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check app tests || true
      - name: Migrations + seed
        run: |
          alembic upgrade head
          python -m scripts.seed
      - name: Unit + health tests
        run: pytest tests/unit tests/integration/test_health.py -q --cov=app --cov-report=term-missing
      - name: Integration (HTTP against live deps via ASGI is skipped; run sync ingest unit path)
        run: pytest tests/unit -q
